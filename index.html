<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2 Cloud Manager</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome 6 (dengan fallback) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 2rem;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Search */
        .search-wrapper {
            position: relative;
            width: 300px;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
        }

        /* Upload Section */
        .upload-section {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .upload-area {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            transform: translateY(-2px);
        }

        .upload-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .upload-area h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .upload-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .upload-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .upload-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* File Info */
        .file-info {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .selected-file {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .selected-file i {
            color: #10b981;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 100px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #10b981, #34d399);
            border-radius: 100px;
            transition: width 0.3s ease;
        }

        /* Files Header */
        .files-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .files-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .file-count {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.35rem 1rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Files Grid */
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
        }

        /* Card */
        .file-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            animation: cardAppear 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.3);
        }

        .preview-container {
            width: 100%;
            height: 160px;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1rem;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .file-card:hover .file-preview {
            transform: scale(1.05);
        }

        .file-icon {
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .file-info-details {
            margin-bottom: 1rem;
        }

        .file-name {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            word-break: break-all;
        }

        .file-meta {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
        }

        .action-btn i {
            font-size: 0.75rem;
        }

        .action-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .view-btn { background: #3b82f6; }
        .copy-btn { background: #10b981; }
        .delete-btn { background: #ef4444; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.95);
            color: #1e293b;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-left: 4px solid #10b981; }
        .toast.error { border-left: 4px solid #ef4444; }
        .toast.info { border-left: 4px solid #3b82f6; }

        /* Loading Skeleton */
        .skeleton {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 1rem;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .skeleton-preview {
            width: 100%;
            height: 160px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .skeleton-line {
            height: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .skeleton-line.short {
            width: 60%;
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .empty-state p {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .search-wrapper {
                width: 100%;
            }
            
            .files-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <i class="fas fa-cloud-upload-alt header-icon"></i>
                <h1>R2 Cloud Manager</h1>
                <span class="badge">v2.0</span>
            </div>
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input 
                    type="text" 
                    class="search-input" 
                    placeholder="Search files..." 
                    id="searchInput"
                >
            </div>
        </div>

        <!-- Upload Section -->
        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt upload-icon"></i>
                <h3>Upload files to R2</h3>
                <p class="upload-text">Click to browse or drag and drop</p>
                <input type="file" id="fileInput" hidden>
                <button class="upload-btn" id="uploadBtn">
                    <i class="fas fa-plus"></i>
                    Choose File
                </button>
            </div>
            
            <!-- File Info & Progress -->
            <div class="file-info">
                <div class="selected-file" id="selectedFile">
                    <i class="fas fa-file"></i>
                    <span>No file selected</span>
                </div>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
        </div>

        <!-- Files Header -->
        <div class="files-header">
            <h2><i class="fas fa-files"></i> Your Files</h2>
            <span class="file-count" id="fileCount">0 files</span>
        </div>
        
        <!-- Files Grid -->
        <div class="files-grid" id="filesGrid"></div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // Configuration
        const API = "https://r2-manager.revpeak2.workers.dev";
        const BUCKET_URL = "https://assets.revpeak.web.id";
        let allFiles = [];

        // DOM Elements
        const filesGrid = document.getElementById('filesGrid');
        const searchInput = document.getElementById('searchInput');
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const selectedFile = document.getElementById('selectedFile');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const fileCount = document.getElementById('fileCount');
        const toast = document.getElementById('toast');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadFiles();
            setupEventListeners();
        });

        // Event Listeners
        function setupEventListeners() {
            searchInput.addEventListener('input', debounce(searchFiles, 300));
            uploadArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleFileSelect);
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.background = 'rgba(255, 255, 255, 0.15)';
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.background = '';
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.background = '';
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    fileInput.files = files;
                    handleFileSelect();
                }
            });
        }

        // Load files
        async function loadFiles() {
            try {
                showLoadingSkeletons();
                const response = await fetch(`${API}/list`);
                const data = await response.json();
                allFiles = data;
                renderFiles(data);
                updateFileCount(data.length);
            } catch (error) {
                showToast('Failed to load files', 'error');
                console.error('Error loading files:', error);
                renderFiles([]);
            }
        }

        // Render files
        function renderFiles(files) {
            if (!files || files.length === 0) {
                filesGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>No files yet. Upload your first file!</p>
                    </div>
                `;
                return;
            }

            filesGrid.innerHTML = files.map((file, index) => {
                const previewUrl = `${API}/file/${file.key}`;
                const isImage = file.key.match(/\.(jpg|jpeg|png|gif|webp|svg)/i);
                const fileSize = formatFileSize(file.size);
                const fileType = getFileType(file.key);
                
                return `
                    <div class="file-card" style="animation-delay: ${index * 0.05}s">
                        <div class="preview-container">
                            ${isImage ? 
                                `<img class="file-preview" src="${previewUrl}" alt="${file.key}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\'fas fa-file-image file-icon\'></i>'">` : 
                                `<i class="fas fa-${fileType} file-icon"></i>`
                            }
                        </div>
                        <div class="file-info-details">
                            <div class="file-name">${file.key}</div>
                            <div class="file-meta">${fileSize}</div>
                        </div>
                        <div class="card-actions">
                            <button class="action-btn view-btn" onclick="viewFile('${file.key}')">
                                <i class="fas fa-eye"></i> View
                            </button>
                            <button class="action-btn copy-btn" onclick="copyLink('${file.key}')">
                                <i class="fas fa-link"></i> Copy
                            </button>
                            <button class="action-btn delete-btn" onclick="deleteFile('${file.key}')">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Handle file select
        function handleFileSelect() {
            const file = fileInput.files[0];
            if (file) {
                selectedFile.innerHTML = `
                    <i class="fas fa-file"></i>
                    <span>${file.name} (${formatFileSize(file.size)})</span>
                `;
                uploadFile(file);
            }
        }

        // Upload file
        async function uploadFile(file) {
            try {
                progressContainer.style.display = 'block';
                progressBar.style.width = '0%';
                
                const formData = new FormData();
                formData.append('file', file);
                
                simulateProgress();
                
                const response = await fetch(`${API}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    progressBar.style.width = '100%';
                    showToast('File uploaded successfully!', 'success');
                    setTimeout(() => {
                        progressBar.style.width = '0%';
                        progressContainer.style.display = 'none';
                        selectedFile.innerHTML = `
                            <i class="fas fa-file"></i>
                            <span>No file selected</span>
                        `;
                        fileInput.value = '';
                    }, 1000);
                    
                    loadFiles();
                } else {
                    throw new Error('Upload failed');
                }
            } catch (error) {
                showToast('Failed to upload file', 'error');
                console.error('Upload error:', error);
                progressBar.style.width = '0%';
            }
        }

        // Simulate progress
        function simulateProgress() {
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 10;
                if (progress >= 90) {
                    clearInterval(interval);
                }
                progressBar.style.width = Math.min(progress, 90) + '%';
            }, 200);
        }

        // Search files
        function searchFiles() {
            const searchTerm = searchInput.value.toLowerCase();
            if (!searchTerm.trim()) {
                renderFiles(allFiles);
                updateFileCount(allFiles.length);
                return;
            }
            
            const filtered = allFiles.filter(file => 
                file.key.toLowerCase().includes(searchTerm)
            );
            renderFiles(filtered);
            updateFileCount(filtered.length);
        }

        // View file
        function viewFile(filename) {
            window.open(`${BUCKET_URL}/${filename}`, '_blank');
        }

        // Copy link
        function copyLink(filename) {
            const url = `${BUCKET_URL}/${filename}`;
            navigator.clipboard.writeText(url).then(() => {
                showToast('Link copied to clipboard!', 'success');
            }).catch(() => {
                showToast('Failed to copy link', 'error');
            });
        }

        // Delete file
        async function deleteFile(filename) {
            if (!confirm('Are you sure you want to delete this file?')) return;
            
            try {
                const response = await fetch(`${API}/delete/${filename}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showToast('File deleted successfully!', 'success');
                    loadFiles();
                } else {
                    throw new Error('Delete failed');
                }
            } catch (error) {
                showToast('Failed to delete file', 'error');
                console.error('Delete error:', error);
            }
        }

        // Show loading skeletons
        function showLoadingSkeletons() {
            const skeletons = Array(6).fill(0).map(() => `
                <div class="skeleton">
                    <div class="skeleton-preview"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>
            `).join('');
            
            filesGrid.innerHTML = skeletons;
        }

        // Show toast
        function showToast(message, type = 'info') {
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Update file count
        function updateFileCount(count) {
            fileCount.textContent = `${count} ${count === 1 ? 'file' : 'files'}`;
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Get file type icon
        function getFileType(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const types = {
                'pdf': 'file-pdf',
                'doc': 'file-word',
                'docx': 'file-word',
                'xls': 'file-excel',
                'xlsx': 'file-excel',
                'zip': 'file-archive',
                'rar': 'file-archive',
                'mp3': 'file-audio',
                'mp4': 'file-video',
                'txt': 'file-alt'
            };
            return types[ext] || 'file';
        }

        // Debounce
        function debounce(func, delay) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, delay);
            };
        }

        // Make functions global
        window.viewFile = viewFile;
        window.copyLink = copyLink;
        window.deleteFile = deleteFile;
    </script>
</body>
</html>
