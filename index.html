<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2 Cloud Manager - Enhanced</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <i class="fas fa-cloud-upload-alt header-icon"></i>
                <h1>R2 Cloud Manager</h1>
                <span class="badge">v2.0</span>
            </div>
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input 
                    type="text" 
                    class="search-input" 
                    placeholder="Search files..." 
                    id="searchInput"
                >
            </div>
        </div>

        <!-- Upload Section -->
        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-cloud-upload-alt upload-icon"></i>
                <h3>Upload files to R2</h3>
                <p class="upload-text">Click to browse or drag and drop</p>
                <input type="file" id="fileInput" hidden>
                <button class="upload-btn" id="uploadBtn">
                    <i class="fas fa-plus"></i>
                    Choose File
                </button>
            </div>
            
            <!-- File Info & Progress -->
            <div class="file-info" id="fileInfo">
                <div class="selected-file" id="selectedFile">
                    <i class="fas fa-file"></i>
                    <span>No file selected</span>
                </div>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
        </div>

        <!-- Files Grid -->
        <div class="files-header">
            <h2><i class="fas fa-files"></i> Your Files</h2>
            <span class="file-count" id="fileCount">0 files</span>
        </div>
        <div class="files-grid" id="filesGrid"></div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
